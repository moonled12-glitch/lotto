name: Update lotto data

on:
  schedule:
    # 매일 17:00 UTC = 다음날 02:00 KST 실행
    # (토요일 추첨 반영 + 일시적 실패 시 다음날 자동 재시도)
    - cron: "0 17 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate latest index.html
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html draws.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-update lotto data ($(date -u +%Y-%m-%d))"
            git push
          fi
